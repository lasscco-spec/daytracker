<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b0d">
<title>DayTracker Clean</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0d;
  --panel:#151518;
  --panel-2:#1d1d22;
  --line:#2a2a31;
  --text:#f6f6f8;
  --muted:#9b9ba7;
  --accent:#ff5d47;
  --accent-soft:rgba(255,93,71,.14);
  --radius:18px;
  --tab-h:76px;
  --safe-bottom:env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:
    radial-gradient(circle at top, rgba(255,93,71,.12), transparent 28%),
    linear-gradient(180deg, #0f0f12 0%, #0b0b0d 100%);
  color:var(--text);
  font-family:"DM Sans",sans-serif;
}
button,input,textarea{font:inherit}
button{cursor:pointer}
#app{min-height:100%;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px)}
.page{display:none;padding:24px 18px 18px}
.page.active{display:block}
.hero{padding:12px 2px 18px}
.eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.title{font-size:30px;font-weight:700;margin-top:6px}
.subtitle{font-size:14px;color:var(--muted);margin-top:6px}
.row{display:flex;gap:12px}
.row.wrap{flex-wrap:wrap}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
}
.card + .card{margin-top:12px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px 10px;
  text-align:center;
}
.stat .icon{font-size:18px}
.stat .value{font-family:"DM Mono",monospace;font-size:18px;font-weight:700;margin-top:6px}
.stat .label{font-size:11px;color:var(--muted);margin-top:4px}
.section-title{font-size:16px;font-weight:700;margin:0 0 10px}
.top-actions{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px}
.btn{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  transition:transform .12s ease, opacity .12s ease;
}
.btn:active{transform:scale(.98);opacity:.92}
.btn-primary{background:var(--text);color:var(--bg);font-weight:700}
.btn-secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
.meal-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.meal-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
}
.meal-photo{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  display:block;
  background:var(--panel-2);
}
.meal-photo-placeholder{
  width:100%;
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg, #1d1d22, #25252c);
  font-size:30px;
}
.meal-body{padding:12px}
.meal-time{font-family:"DM Mono",monospace;font-size:12px;font-weight:700}
.meal-note{font-size:12px;color:var(--muted);margin-top:4px;min-height:16px}
.meal-meta{font-size:11px;color:var(--muted);margin-top:4px}
.empty{
  padding:44px 18px;
  text-align:center;
  color:var(--muted);
  background:var(--panel);
  border:1px dashed var(--line);
  border-radius:18px;
}
.history-list{display:flex;flex-direction:column;gap:12px}
.history-day{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px}
.history-date{font-size:13px;font-weight:700;margin-bottom:10px}
.history-item + .history-item{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.history-item-time{font-family:"DM Mono",monospace;font-size:12px}
.history-item-note{font-size:12px;color:var(--muted);margin-top:4px}
.tabbar{
  position:fixed;
  left:0;right:0;bottom:0;
  height:calc(var(--tab-h) + var(--safe-bottom));
  padding:10px 10px calc(10px + var(--safe-bottom));
  background:rgba(12,12,14,.92);
  backdrop-filter:blur(22px);
  border-top:1px solid var(--line);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.tab{
  border:none;
  background:none;
  color:#6f707c;
  border-radius:14px;
  font-size:11px;
  font-weight:700;
}
.tab.active{background:var(--accent-soft);color:#ff9b8f}
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:flex-end;
  justify-content:center;
  background:rgba(0,0,0,.62);
  padding:12px;
  z-index:20;
}
.modal.open{display:flex}
.sheet{
  position:relative;
  width:min(720px,100%);
  max-height:92dvh;
  overflow:auto;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:26px 26px 18px 18px;
  padding:18px 16px 24px;
}
.sheet-handle{width:40px;height:4px;border-radius:999px;background:#3b3b44;margin:0 auto 16px}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:16px;padding-right:42px}
.sheet-close{
  position:absolute;
  top:14px;
  right:14px;
  width:34px;height:34px;
  border:none;
  border-radius:999px;
  background:var(--panel-2);
  color:var(--text);
  font-size:24px;
  line-height:1;
}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
.input,.textarea{
  width:100%;
  border:1px solid var(--line);
  background:var(--panel-2);
  color:var(--text);
  border-radius:14px;
  padding:13px 14px;
  outline:none;
}
.textarea{min-height:92px;resize:vertical}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-box{
  aspect-ratio:4 / 3;
  border-radius:18px;
  border:1px solid var(--line);
  overflow:hidden;
  background:var(--panel-2);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
}
.photo-box img{width:100%;height:100%;object-fit:cover}
.photo-placeholder{color:var(--muted);text-align:center;font-size:14px;padding:10px}
.heart-slider{position:relative;padding:6px 2px}
.heart-input{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:0;
}
.heart-row{display:grid;grid-template-columns:repeat(10,minmax(0,1fr));gap:4px}
.heart-row img{width:100%;max-width:30px;justify-self:center;image-rendering:pixelated}
.heart-meta{
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:var(--muted);
  font-size:12px;
}
.heart-value{font-family:"DM Mono",monospace;font-size:15px;color:var(--text)}
.preview-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.preview-strip img{width:72px;height:72px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}
.danger{background:#3a1110;color:#ff9a8f}
@media (max-width: 640px){
  .meal-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <section class="page active" id="page-overview">
    <div class="hero">
      <div class="eyebrow">DayTracker Clean</div>
      <div class="title">식사와 하루 기록</div>
      <div class="subtitle" id="todayLabel"></div>
    </div>
    <div class="stat-grid" id="todayStats"></div>
    <div class="card">
      <div class="section-title">오늘 식사</div>
      <div id="todayMeals"></div>
    </div>
  </section>

  <section class="page" id="page-meals">
    <div class="hero top-actions">
      <div>
        <div class="title" style="font-size:28px">식사</div>
        <div class="subtitle" id="mealSubLabel"></div>
      </div>
      <button class="btn btn-primary" id="openCreateBtn">추가</button>
    </div>
    <div id="mealList"></div>
  </section>

  <section class="page" id="page-stats">
    <div class="hero">
      <div class="title" style="font-size:28px">통계</div>
      <div class="subtitle">저장된 식사 기록 기준</div>
    </div>
    <div class="card" id="statsCard"></div>
  </section>

  <section class="page" id="page-history">
    <div class="hero">
      <div class="title" style="font-size:28px">기록</div>
      <div class="subtitle">날짜별로 다시 보기</div>
    </div>
    <div id="historyList"></div>
  </section>
</div>

<nav class="tabbar">
  <button class="tab active" data-page="overview">오늘</button>
  <button class="tab" data-page="meals">식사</button>
  <button class="tab" data-page="stats">통계</button>
  <button class="tab" data-page="history">기록</button>
</nav>

<div class="modal" id="mealModal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" type="button" data-close="mealModal">×</button>
    <div class="sheet-title" id="mealModalTitle">식사 기록</div>
    <div class="photo-box">
      <img id="photoPreview" alt="" style="display:none">
      <div class="photo-placeholder" id="photoPlaceholder">사진을 추가하면 여기서 미리 보여요</div>
    </div>
    <div class="row wrap" style="margin-bottom:12px">
      <button class="btn btn-secondary" type="button" id="cameraBtn">카메라</button>
      <button class="btn btn-secondary" type="button" id="galleryBtn">갤러리</button>
    </div>
    <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>
    <input id="galleryInput" type="file" accept="image/*" hidden>

    <div class="two-col">
      <div class="field">
        <label for="startInput">시작 시간</label>
        <input class="input" id="startInput" type="time">
      </div>
      <div class="field">
        <label for="endInput">종료 시간</label>
        <input class="input" id="endInput" type="time">
      </div>
    </div>

    <div class="field">
      <label for="noteInput">메모</label>
      <textarea class="textarea" id="noteInput" placeholder="무엇을 먹었는지 적어두세요"></textarea>
    </div>

    <div class="field">
      <label>먹기 전 배고픔 <span id="beforeLabelValue">5</span></label>
      <div class="heart-slider">
        <input class="heart-input" id="beforeInput" type="range" min="0" max="10" step="0.5" value="5">
        <div class="heart-row" id="beforeHearts"></div>
      </div>
      <div class="heart-meta"><span>0</span><span class="heart-value" id="beforeValue">5</span><span>10</span></div>
    </div>

    <div class="field">
      <label>먹은 후 배고픔 <span id="afterLabelValue">2</span></label>
      <div class="heart-slider">
        <input class="heart-input" id="afterInput" type="range" min="0" max="10" step="0.5" value="2">
        <div class="heart-row" id="afterHearts"></div>
      </div>
      <div class="heart-meta"><span>0</span><span class="heart-value" id="afterValue">2</span><span>10</span></div>
    </div>

    <div class="field">
      <label for="costInput">금액</label>
      <input class="input" id="costInput" type="number" inputmode="numeric" min="0" placeholder="예: 12000">
    </div>

    <div class="row wrap">
      <button class="btn btn-primary" type="button" id="saveMealBtn">저장</button>
      <button class="btn danger" type="button" id="deleteMealBtn" style="display:none">삭제</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "recs";
const HEART_FULL_SRC = "./1.png";
const HEART_HALF_SRC = "./2.png";
const HEART_EMPTY_SRC = "./3.png";

const state = {
  page: "overview",
  editing: null,
  photoData: null
};

const $ = selector => document.querySelector(selector);
const $$ = selector => Array.from(document.querySelectorAll(selector));

function readJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

function writeJSON(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function getRecords() {
  return readJSON(STORAGE_KEY, {});
}

function saveRecord(record) {
  const all = getRecords();
  all[record.date] = record;
  writeJSON(STORAGE_KEY, all);
}

function recordFor(dateKey) {
  const all = getRecords();
  return all[dateKey] || { date: dateKey, wake: null, blocks: [] };
}

function dateKey(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function pad(num) {
  return String(num).padStart(2, "0");
}

function timeText(date) {
  return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function formatRange(startIso, endIso) {
  const start = new Date(startIso);
  const end = endIso ? new Date(endIso) : start;
  return `${timeText(start)} - ${timeText(end)}`;
}

function hungerText(value) {
  return Number.isInteger(value) ? String(value) : value.toFixed(1);
}

function won(value) {
  return `${Number(value || 0).toLocaleString("ko-KR")}원`;
}

function mealBlocks() {
  const records = Object.values(getRecords());
  return records.flatMap(record =>
    (record.blocks || [])
      .filter(block => block.category === "meal")
      .map(block => ({ ...block, recordDate: record.date }))
  ).sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
}

function todayMeals() {
  const today = dateKey();
  return mealBlocks().filter(block => block.recordDate === today);
}

function buildIso(dateStr, timeStr, fallback) {
  if (!timeStr) return fallback;
  const [hh, mm] = timeStr.split(":").map(Number);
  const base = new Date(`${dateStr}T00:00:00`);
  base.setHours(hh, mm, 0, 0);
  return base.toISOString();
}

function renderHeartRow(containerId, value) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  for (let i = 0; i < 10; i += 1) {
    const img = document.createElement("img");
    const amount = value - i;
    img.src = amount >= 1 ? HEART_FULL_SRC : amount >= 0.5 ? HEART_HALF_SRC : HEART_EMPTY_SRC;
    img.alt = "";
    container.appendChild(img);
  }
}

function syncHeartControl(prefix, value) {
  renderHeartRow(`${prefix}Hearts`, value);
  document.getElementById(`${prefix}Value`).textContent = hungerText(value);
  document.getElementById(`${prefix}LabelValue`).textContent = hungerText(value);
}

function setPage(page) {
  state.page = page;
  $$(".page").forEach(pageEl => pageEl.classList.toggle("active", pageEl.id === `page-${page}`));
  $$(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.page === page));
}

function mealCardHTML(meal) {
  const photo = meal.photos && meal.photos[0];
  const photoMarkup = photo
    ? `<img class="meal-photo" src="${photo}" alt="" loading="lazy">`
    : `<div class="meal-photo-placeholder">Meal</div>`;
  return `
    <article class="meal-card" data-meal-id="${meal.id}" data-record-date="${meal.recordDate}">
      ${photoMarkup}
      <div class="meal-body">
        <div class="meal-time">${formatRange(meal.startTime, meal.endTime)}</div>
        <div class="meal-note">${meal.note || "메모 없음"}</div>
        <div class="meal-meta">배고픔 ${hungerText(meal.hungerBefore ?? 0)} → ${hungerText(meal.hungerAfter ?? 0)}</div>
        <div class="meal-meta">${meal.cost ? won(meal.cost) : "금액 없음"}</div>
      </div>
    </article>
  `;
}

function renderOverview() {
  const meals = todayMeals();
  const totalCost = meals.reduce((sum, meal) => sum + Number(meal.cost || 0), 0);
  const avgBefore = meals.length ? meals.reduce((sum, meal) => sum + Number(meal.hungerBefore || 0), 0) / meals.length : 0;
  const avgAfter = meals.length ? meals.reduce((sum, meal) => sum + Number(meal.hungerAfter || 0), 0) / meals.length : 0;

  $("#todayLabel").textContent = `${new Date().toLocaleDateString("ko-KR", { month: "long", day: "numeric", weekday: "short" })}`;
  $("#todayStats").innerHTML = `
    <div class="stat"><div class="icon">🍽️</div><div class="value">${meals.length}</div><div class="label">오늘 식사</div></div>
    <div class="stat"><div class="icon">💸</div><div class="value">${meals.length ? won(totalCost) : "-"}</div><div class="label">오늘 금액</div></div>
    <div class="stat"><div class="icon">❤️</div><div class="value">${meals.length ? `${hungerText(avgBefore)} → ${hungerText(avgAfter)}` : "-"}</div><div class="label">평균 배고픔</div></div>
  `;
  $("#todayMeals").innerHTML = meals.length
    ? `<div class="meal-grid">${meals.map(mealCardHTML).join("")}</div>`
    : `<div class="empty">오늘 기록된 식사가 아직 없어요.</div>`;
}

function renderMeals() {
  const meals = mealBlocks();
  $("#mealSubLabel").textContent = `전체 ${meals.length}개`;
  $("#mealList").innerHTML = meals.length
    ? `<div class="meal-grid">${meals.map(mealCardHTML).join("")}</div>`
    : `<div class="empty">아직 저장된 식사가 없어요.</div>`;
}

function renderStats() {
  const meals = mealBlocks();
  const totalCost = meals.reduce((sum, meal) => sum + Number(meal.cost || 0), 0);
  const avgCost = meals.length ? Math.round(totalCost / meals.length) : 0;
  const avgBefore = meals.length ? meals.reduce((sum, meal) => sum + Number(meal.hungerBefore || 0), 0) / meals.length : 0;
  const avgAfter = meals.length ? meals.reduce((sum, meal) => sum + Number(meal.hungerAfter || 0), 0) / meals.length : 0;
  $("#statsCard").innerHTML = `
    <div class="section-title">식사 통계</div>
    <div class="meal-meta">총 식사 수: ${meals.length}개</div>
    <div class="meal-meta" style="margin-top:8px">총 금액: ${meals.length ? won(totalCost) : "-"}</div>
    <div class="meal-meta" style="margin-top:8px">평균 금액: ${meals.length ? won(avgCost) : "-"}</div>
    <div class="meal-meta" style="margin-top:8px">평균 먹기 전 배고픔: ${meals.length ? hungerText(avgBefore) : "-"}</div>
    <div class="meal-meta" style="margin-top:8px">평균 먹은 후 배고픔: ${meals.length ? hungerText(avgAfter) : "-"}</div>
  `;
}

function renderHistory() {
  const meals = mealBlocks();
  const groups = meals.reduce((map, meal) => {
    map[meal.recordDate] ||= [];
    map[meal.recordDate].push(meal);
    return map;
  }, {});
  const entries = Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
  $("#historyList").innerHTML = entries.length ? `<div class="history-list">${
    entries.map(([date, items]) => `
      <section class="history-day">
        <div class="history-date">${date}</div>
        ${items.map(item => `
          <div class="history-item">
            <div class="history-item-time">${formatRange(item.startTime, item.endTime)}</div>
            <div class="history-item-note">${item.note || "메모 없음"} · 배고픔 ${hungerText(item.hungerBefore ?? 0)} → ${hungerText(item.hungerAfter ?? 0)}</div>
          </div>
        `).join("")}
      </section>
    `).join("")
  }</div>` : `<div class="empty">기록이 아직 없어요.</div>`;
}

function renderAll() {
  renderOverview();
  renderMeals();
  renderStats();
  renderHistory();
}

function openMealModal(meal = null) {
  state.editing = meal;
  state.photoData = meal?.photos?.[0] || null;
  $("#mealModalTitle").textContent = meal ? "식사 수정" : "식사 기록";
  const start = meal ? timeText(new Date(meal.startTime)) : timeText(new Date());
  const end = meal?.endTime ? timeText(new Date(meal.endTime)) : start;
  $("#startInput").value = start;
  $("#endInput").value = end;
  $("#noteInput").value = meal?.note || "";
  $("#costInput").value = meal?.cost || "";
  $("#beforeInput").value = meal?.hungerBefore ?? 5;
  $("#afterInput").value = meal?.hungerAfter ?? 2;
  syncHeartControl("before", parseFloat($("#beforeInput").value));
  syncHeartControl("after", parseFloat($("#afterInput").value));
  $("#deleteMealBtn").style.display = meal ? "inline-flex" : "none";
  updatePhotoPreview();
  $("#mealModal").classList.add("open");
}

function closeMealModal() {
  $("#mealModal").classList.remove("open");
}

function updatePhotoPreview() {
  if (state.photoData) {
    $("#photoPreview").src = state.photoData;
    $("#photoPreview").style.display = "block";
    $("#photoPlaceholder").style.display = "none";
  } else {
    $("#photoPreview").style.display = "none";
    $("#photoPlaceholder").style.display = "block";
  }
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

async function handlePhotoInput(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  state.photoData = await fileToDataURL(file);
  updatePhotoPreview();
  event.target.value = "";
}

function findMeal(recordDate, mealId) {
  const record = recordFor(recordDate);
  const idx = record.blocks.findIndex(block => block.id === mealId);
  if (idx < 0) return null;
  return { record, idx, block: record.blocks[idx] };
}

function saveMeal() {
  const existing = state.editing;
  const recordDate = existing?.recordDate || dateKey();
  const record = recordFor(recordDate);
  const startIso = buildIso(recordDate, $("#startInput").value, new Date().toISOString());
  const endIso = buildIso(recordDate, $("#endInput").value, startIso);

  const payload = {
    id: existing?.id || String(Date.now()),
    category: "meal",
    customLabel: "",
    startTime: startIso,
    endTime: endIso,
    note: $("#noteInput").value.trim(),
    photos: state.photoData ? [state.photoData] : [],
    cost: parseInt($("#costInput").value || "0", 10) || 0,
    hungerBefore: parseFloat($("#beforeInput").value || "0") || 0,
    hungerAfter: parseFloat($("#afterInput").value || "0") || 0
  };

  if (existing) {
    const idx = record.blocks.findIndex(block => block.id === existing.id);
    if (idx >= 0) record.blocks[idx] = payload;
  } else {
    record.blocks.push(payload);
  }

  saveRecord(record);
  closeMealModal();
  renderAll();
}

function deleteMeal() {
  if (!state.editing) return;
  const record = recordFor(state.editing.recordDate);
  record.blocks = record.blocks.filter(block => block.id !== state.editing.id);
  saveRecord(record);
  closeMealModal();
  renderAll();
}

function bindEvents() {
  $$(".tab").forEach(tab => tab.addEventListener("click", () => setPage(tab.dataset.page)));
  $("#openCreateBtn").addEventListener("click", () => openMealModal());
  $("#saveMealBtn").addEventListener("click", saveMeal);
  $("#deleteMealBtn").addEventListener("click", deleteMeal);
  $("#cameraBtn").addEventListener("click", () => $("#cameraInput").click());
  $("#galleryBtn").addEventListener("click", () => $("#galleryInput").click());
  $("#cameraInput").addEventListener("change", handlePhotoInput);
  $("#galleryInput").addEventListener("change", handlePhotoInput);
  $("#beforeInput").addEventListener("input", e => syncHeartControl("before", parseFloat(e.target.value)));
  $("#afterInput").addEventListener("input", e => syncHeartControl("after", parseFloat(e.target.value)));
  $$("[data-close]").forEach(btn => btn.addEventListener("click", () => document.getElementById(btn.dataset.close).classList.remove("open")));
  $$(".modal").forEach(modal => modal.addEventListener("click", e => {
    if (e.target === modal) modal.classList.remove("open");
  }));

  document.addEventListener("click", event => {
    const card = event.target.closest("[data-meal-id]");
    if (!card) return;
    const meal = mealBlocks().find(item => item.id === card.dataset.mealId && item.recordDate === card.dataset.recordDate);
    if (meal) openMealModal(meal);
  });
}

renderAll();
bindEvents();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
