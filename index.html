<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayTracker">
<meta name="theme-color" content="#0a0a0a">
<title>DayTracker</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--sf:#141414;--sf2:#1e1e1e;--bd:#2a2a2a;--tx:#f0f0f0;--tx2:#888;--tx3:#444;--r:16px;--tbh:72px;--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh}
.page{display:none;flex:1;overflow-y:auto;padding-bottom:calc(var(--tbh) + var(--sb) + 8px)}.page.active{display:block}

/* TAB */
.tab-bar{position:fixed;left:0;right:0;bottom:0;height:calc(var(--tbh) + var(--sb));padding:8px 0 var(--sb);background:rgba(14,14,14,.98);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;align-items:flex-start;z-index:1000}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;color:var(--tx3);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;padding:6px 0;cursor:pointer;transition:color .2s}
.tb svg{width:22px;height:22px}.tb.on{color:var(--tx)}

/* HEADER */
.ph{padding:56px 20px 16px;position:sticky;top:0;background:var(--bg);z-index:10}
.pt{font-size:28px;font-weight:700;letter-spacing:-.5px}.ps{font-size:13px;color:var(--tx2);margin-top:2px}

/* CARD / BTN */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;-webkit-user-select:none}
.btn:active{transform:scale(.97);opacity:.85}
.bp{background:var(--tx);color:var(--bg);font-size:15px;padding:14px 20px;width:100%}
.bo{background:var(--sf2);color:var(--tx);font-size:14px;padding:12px 16px;border:1px solid var(--bd)}
.bd2{background:#FF453A22;color:#FF453A;font-size:14px;padding:12px 16px;border:1px solid #FF453A44}
.bsm{padding:8px 14px;font-size:13px;border-radius:8px}

/* BLOCK ROW */
.brow{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bd)}
.brow:active{background:var(--sf)}
.bdot{width:4px;height:38px;border-radius:2px;flex-shrink:0}
.bi{flex:1;min-width:0}.bn{font-size:15px;font-weight:500}
.bt{font-size:12px;color:var(--tx2);font-family:'DM Mono',monospace;margin-top:2px}
.bdur{font-size:13px;color:var(--tx2);font-family:'DM Mono',monospace;flex-shrink:0}
.rbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:6px}

/* OVERLAY / SHEET */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.ov.open{display:flex}
.sheet{background:var(--sf);border-radius:24px 24px 0 0;width:100%;max-height:92dvh;overflow-y:auto;padding:0 20px calc(24px + var(--sb));animation:su .3s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 20px}
.stitle{font-size:20px;font-weight:700;margin-bottom:20px}

/* FORM */
.fg{margin-bottom:16px}
.fl{font-size:13px;color:var(--tx2);font-weight:500;margin-bottom:8px;display:block}
.fi{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;outline:none}
.fi:focus{border-color:#444}
.tr{display:flex;gap:8px}.tr .fg{flex:1}

/* CAT GRID */
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.cchip{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border-radius:12px;border:1px solid var(--bd);background:var(--sf2);cursor:pointer;transition:all .15s}
.cchip.sel{border-width:2px}
.cci{font-size:20px}.ccn{font-size:10px;font-weight:500}.ccc{width:8px;height:8px;border-radius:50%;margin-top:2px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--tbh) + var(--sb) + 14px);left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.div{height:1px;background:var(--bd);margin:0 0 20px}
.empty{text-align:center;padding:60px 20px;color:var(--tx2);font-size:15px}
.empty .ei{font-size:48px;margin-bottom:12px}

/* TODAY */
.hero{padding:56px 20px 18px;background:
linear-gradient(180deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,0) 100%),
radial-gradient(circle at top right,rgba(255,255,255,.08),transparent 42%),
var(--bg)}
.hdate{font-size:13px;color:var(--tx2);font-weight:500}
.hgreet{font-size:30px;font-weight:700;letter-spacing:-.6px;margin-top:6px}
.today-wrap{padding:0 20px 20px}
.wrow{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:linear-gradient(180deg,#171717 0%,#121212 100%);border:1px solid var(--bd);border-radius:18px;margin-bottom:14px;gap:12px}
.wake-copy{display:flex;flex-direction:column;gap:4px}
.wake-label{font-size:13px;color:var(--tx2);font-weight:500}
.wval{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.abc{margin-bottom:16px;border-radius:22px;padding:18px;display:none;position:relative;overflow:hidden}
.abc.on{display:block}
.abc.on::after{content:'';position:absolute;inset:auto -40px -40px auto;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.active-top{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.active-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.active-copy{flex:1;min-width:0}
.active-kicker{font-size:12px;color:rgba(255,255,255,.72);margin-bottom:4px}
.active-name{font-size:22px;font-weight:700;line-height:1.15}
.active-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;position:relative;z-index:1}
.active-pill{padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.09);font-size:12px;color:rgba(255,255,255,.88);font-family:'DM Mono',monospace}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.sp{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 10px;text-align:center}
.spi{font-size:18px;margin-bottom:5px}.spv{font-size:18px;font-weight:700}.spl{font-size:11px;color:var(--tx2);margin-top:2px}
.today-sec{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.today-title{font-size:13px;font-weight:700;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.qbtn{background:linear-gradient(180deg,#171717 0%,#121212 100%);border:1px solid var(--bd);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s,transform .1s;-webkit-user-select:none}
.qbtn:active{transform:scale(.97);background:var(--sf2)}
.qi{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ql{font-size:14px;font-weight:600;flex:1}
.qsub{font-size:11px;color:var(--tx2);margin-top:2px}
.today-actions{margin-bottom:18px}
.today-list-title{font-size:13px;font-weight:700;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}

/* TIMELINE */
.dstrip{display:flex;gap:6px;overflow-x:auto;padding:0 20px 16px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dchip{flex-shrink:0;width:48px;height:60px;border-radius:12px;border:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:background .15s}
.dchip.on{background:var(--tx);border-color:var(--tx)}
.dchip.on .dday,.dchip.on .dnum{color:var(--bg)}
.dday{font-size:10px;color:var(--tx2);font-weight:500}.dnum{font-size:18px;font-weight:700}
.rw{padding:0 20px 20px}
.dayrect{display:grid;grid-template-columns:44px 1fr;gap:12px;align-items:stretch}
.dt-axis{position:relative;height:720px}
.dt-hour{position:absolute;left:0;transform:translateY(-50%);font-size:11px;color:var(--tx3);font-family:'DM Mono',monospace}
.dt-track{position:relative;height:720px;border-radius:20px;background:linear-gradient(180deg,#151515 0%,#0f0f0f 100%);border:1px solid var(--bd);overflow:hidden}
.dt-grid{position:absolute;left:0;right:0;height:1px;background:#2a2a2a}
.dt-grid.major{background:#3a3a3a}
.dt-block{position:absolute;left:10px;right:10px;border-radius:14px;padding:8px 10px;overflow:hidden;color:#fff;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.dt-time{font-size:10px;font-family:'DM Mono',monospace;opacity:.88}
.dt-label{font-size:13px;font-weight:700;line-height:1.2;margin-top:4px}
.dt-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;color:var(--tx2);font-size:14px}
.mprevstrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin:-4px 0 16px;scrollbar-width:none}
.mprevstrip::-webkit-scrollbar{display:none}
.mprevitem{position:relative;flex-shrink:0}
.mprevitem img{width:64px;height:64px;border-radius:10px;object-fit:cover;display:block}
.mprevdel{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border:none;border-radius:50%;background:#FF453A;color:#fff;font-size:12px;line-height:1;cursor:pointer}
.mbadge{position:absolute;top:8px;right:8px;background:rgba(10,10,10,.78);color:#fff;border-radius:999px;padding:4px 7px;font-size:11px;font-family:'DM Mono',monospace}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px 20px}
.li{display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px;cursor:pointer}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ln{font-size:13px;flex:1}.ldur{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;color:var(--tx2)}

/* WEEK CAL */
.wcwrap{padding:0 20px 20px;overflow-x:auto}
.wct{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;position:absolute;line-height:1}
.wcblock{position:absolute;left:1px;right:1px;border-radius:3px;min-height:2px;overflow:hidden}
.wcbl{font-size:8px;font-weight:600;color:#fff;padding:1px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MEALS */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px}
.mc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer}
.mp{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--sf2)}
.mph{width:100%;aspect-ratio:1;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:32px}
.mm{padding:10px}.mt2{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.mn2{font-size:12px;color:var(--tx2);margin-top:2px}
.cama{width:100%;aspect-ratio:4/3;background:var(--sf2);border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:12px;cursor:pointer;position:relative}
.cama img{width:100%;height:100%;object-fit:cover}
.camph{text-align:center;color:var(--tx2)}.camph .cpi{font-size:40px;margin-bottom:8px}.camph p{font-size:14px}
.psrow{display:flex;gap:8px;margin-bottom:16px}

/* STATS */
.ptabs{display:flex;gap:6px;margin-bottom:16px}
.ptab{flex:1;padding:8px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.ptab.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.barchart{display:flex;flex-direction:column;gap:10px}
.barrow{display:flex;align-items:center;gap:10px}
.barlbl{width:40px;font-size:12px;color:var(--tx2);text-align:right;flex-shrink:0}
.bartrack{flex:1;height:8px;background:var(--sf2);border-radius:4px;overflow:hidden}
.barfill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.barval{width:40px;font-size:11px;color:var(--tx2);font-family:'DM Mono',monospace}
.dwrap{display:flex;justify-content:center;padding:10px 0 20px}
.dwrap svg{width:180px;height:180px}
.ic{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.iico{font-size:28px}.ilbl{font-size:12px;color:var(--tx2)}.ival{font-size:20px;font-weight:700;margin-top:2px}

/* HISTORY */
.hlist{padding:0 20px;display:flex;flex-direction:column;gap:8px}
.hcard{background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.hch{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer}
.hdb{text-align:center;min-width:36px}.hdn{font-size:22px;font-weight:700}.hdm{font-size:11px;color:var(--tx2)}
.hdi{flex:1}.hdd{display:flex;gap:4px;margin-bottom:5px}.hddot{width:8px;height:8px;border-radius:50%}
.hdmeta{font-size:12px;color:var(--tx2)}
.dblocks{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.drow{display:flex;gap:10px;align-items:flex-start;background:var(--sf2);border-radius:10px;padding:10px}
.ddot{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:32px}
.dcont{flex:1;min-width:0}
.dname{font-size:14px;font-weight:500}.dtime{font-size:11px;color:var(--tx2);font-family:'DM Mono',monospace}
.dnote{font-size:12px;color:var(--tx2);margin-top:4px;white-space:pre-wrap}
.dphotos{display:flex;gap:4px;margin-top:6px;overflow-x:auto}
.dphoto{width:52px;height:52px;border-radius:6px;object-fit:cover;flex-shrink:0;cursor:pointer}
.addpbtn{font-size:12px;color:var(--tx3);background:none;border:1px dashed var(--bd);border-radius:8px;padding:6px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;display:inline-block}

/* COLOR PICKER */
.cswgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.csw{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.csw.on{border-color:#fff;transform:scale(1.15)}

/* PHOTO EDITOR */
.edov{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column}
.edov.open{display:flex}
.edtb{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#111;border-bottom:1px solid #222}
.edcw{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
#ec{max-width:100%;max-height:100%;display:block;touch-action:none}
.edbot{background:#111;border-top:1px solid #222;padding:12px 16px calc(12px + var(--sb))}
.edtools{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.edtools::-webkit-scrollbar{display:none}
.etbtn{flex-shrink:0;padding:8px 14px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#ccc;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.etbtn.on{border-color:#fff;color:#fff;background:#222}
.strow{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:4px 0}
.strow::-webkit-scrollbar{display:none}
.stbtn{font-size:28px;cursor:pointer;flex-shrink:0;padding:4px}
.crow{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:transform .15s}
.cdot.on{border-color:#fff;transform:scale(1.2)}
.tinrow{display:flex;gap:8px;align-items:center;margin-top:10px}
.tinrow input{flex:1;background:#222;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
</style>
</head>
<body>
<div id="app">

<!-- TODAY -->
<div id="today-page" class="page active">
  <div class="hero">
    <div class="hdate" id="td"></div>
    <div class="hgreet" id="tg">오늘</div>
  </div>
  <div class="today-wrap">
    <div class="wrow" id="wr"></div>
    <div class="abc" id="abc">
      <div class="active-top">
        <div id="abi" class="active-icon"></div>
        <div class="active-copy">
          <div class="active-kicker">지금 하고 있는 활동</div>
          <div id="abl" class="active-name"></div>
        </div>
      </div>
      <div class="active-meta">
        <div class="active-pill" id="abe">00:00</div>
        <div class="active-pill" id="abs">시작 00:00</div>
      </div>
      <button class="btn bd2" style="width:100%;margin-top:16px;position:relative;z-index:1" onclick="stopAct()">활동 종료</button>
    </div>
    <div class="srow">
      <div class="sp"><div class="spi">🌙</div><div class="spv" id="ss">-</div><div class="spl">수면</div></div>
      <div class="sp"><div class="spi">🍽</div><div class="spv" id="sm">0회</div><div class="spl">식사</div></div>
      <div class="sp"><div class="spi">⚡</div><div class="spv" id="sa">0건</div><div class="spl">활동</div></div>
    </div>
    <div class="today-sec">
      <div class="today-title">빠른 시작</div>
      <button class="btn bo bsm" onclick="openQE()" style="font-size:12px">편집</button>
    </div>
    <div class="qgrid" id="qg"></div>
    <div class="today-actions">
      <button class="btn bo" onclick="openManual()" style="font-size:13px;color:var(--tx2)">빈 시간 직접 기록하기</button>
    </div>
    <div class="today-list-title" id="blt" style="display:none">오늘의 활동</div>
  </div>
  <div id="bl"></div>
</div>

<!-- TIMELINE -->
<div id="timeline-page" class="page">
  <div class="ph"><div class="pt">타임라인</div></div>
  <div class="dstrip" id="ds"></div>
  <div class="rw">
  <div class="dayrect">
    <div class="dt-axis" id="dt-axis"></div>
    <div class="dt-track" id="rsvg"></div>
  </div>
</div>
<div class="lgrid" id="tlleg"></div>
  <div class="div" style="margin:0 20px 16px"></div>
  <div style="padding:0 20px;margin-bottom:8px;font-size:15px;font-weight:600">주간 캘린더</div>
  <div class="wcwrap" id="wc"></div>
  <div class="div" style="margin:0 20px 16px"></div>
  <div id="tlbl" style="padding:0"></div>
  <div style="height:20px"></div>
</div>

<!-- MEALS -->
<div id="meals-page" class="page">
  <div class="ph" style="display:flex;align-items:flex-end;justify-content:space-between">
    <div><div class="pt">식사</div><div class="ps" id="msub">오늘</div></div>
    <button class="btn bo bsm" onclick="openMeal()">사진 추가</button>
  </div>
  <div class="mgrid" id="mg"></div>
  <div id="me" class="empty" style="display:none"><div class="ei">🍽</div><p>식사를 기록해보세요</p></div>
</div>

<!-- STATS -->
<div id="stats-page" class="page">
  <div class="ph"><div class="pt">통계</div><div class="ps">시간을 어떻게 쓰고 있나요</div></div>
  <div style="padding:0 20px 20px">
    <div class="ptabs">
      <div class="ptab on" onclick="setPeriod('today',this)">오늘</div>
      <div class="ptab" onclick="setPeriod('week',this)">이번 주</div>

<script>
// ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??DATA ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??const DCOLS={sleep:'#7B9CFF',study:'#5EC4A8',exercise:'#FF7B5E',meal:'#FFB84D',rest:'#B8A9F5',work:'#4DA8D4',social:'#F57B9C',custom:'#999999'};
const CMETA={sleep:{l:'수면',i:'🌙'},study:{l:'공부',i:'📘'},exercise:{l:'운동',i:'🏃'},meal:{l:'식사',i:'🍽'},rest:{l:'휴식',i:'🛋'},work:{l:'업무',i:'💼'},social:{l:'약속',i:'🤝'},custom:{l:'기타',i:'✨'}};
const PAL=['#FF6B6B','#FF9F43','#FECA57','#48DBFB','#1DD1A1','#54A0FF','#5F27CD','#FF9FF3','#7B9CFF','#5EC4A8','#FF7B5E','#FFB84D','#B8A9F5','#4DA8D4','#F57B9C','#AAAAAA','#FFFFFF','#000000'];
const STKS=['?삃','?쁻','?뵦','?뮞','?샂','?뜒','?렦','?ㅿ툘','狩?,'?뙚','?몡','?쨺','?삇','?Ⅳ','?뱴','?룍截?,'??,'?뙔','?截?,'?렞'];

const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const ld=(k,d)=>{try{const x=localStorage.getItem(k);return x?JSON.parse(x):d}catch{return d}};
const catCol=c=>({...ld('catCols',{})})[c]||DCOLS[c]||'#999';
const setCatCol=(c,v)=>{const x=ld('catCols',{});x[c]=v;sv('catCols',x)};
const cat=c=>({...CMETA[c]||CMETA.custom,color:catCol(c)});
const dk=(d=new Date())=>d.toISOString().slice(0,10);
const getRec=(d=dk())=>{const a=ld('recs',{});return a[d]||{date:d,wake:null,blocks:[]}};
const saveRec=r=>{const a=ld('recs',{});a[r.date]=r;sv('recs',a)};
const allRecs=()=>Object.values(ld('recs',{})).sort((a,b)=>b.date.localeCompare(a.date));
const getAct=()=>ld('act',null);
const saveAct=b=>sv('act',b);
const getQB=()=>ld('qb',[{c:'study',l:''},{c:'exercise',l:''},{c:'work',l:''},{c:'rest',l:''},{c:'meal',l:''}]);
const saveQB=v=>sv('qb',v);
const f2=n=>String(n).padStart(2,'0');
const ft=d=>`${f2(d.getHours())}:${f2(d.getMinutes())}`;
const dur=b=>((b.endTime?new Date(b.endTime):new Date())-new Date(b.startTime))/1000;
const dTxt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0&&m>0)return`${h}h ${m}m`;if(h>0)return`${h}h`;if(m>0)return`${m}m`;return`${Math.max(0,Math.floor(s))}s`};
const toast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000)};
const cls=id=>document.getElementById(id).classList.remove('open');

// ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??STATE ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??let sCat='study',mCat='rest',eCat='rest',etimer=null,tlDate=dk(),sPeriod='today';
let ebId=null,ebDk=null,mPhData=[],colCat=null,selColVal=null;
let dBId=null,dBDk=null,dPhotos=[];
let edLayers=[],edTool='text',edCol='#ffffff',edBase=null,edDrawing=false,edPath=[],edPIdx=null;

// ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??NAV ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??function go(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById(name+'-page').classList.add('active');btn.classList.add('on');
  if(name==='today')rToday();if(name==='timeline')rTL();if(name==='meals')rMeals();if(name==='stats')rStats();if(name==='history')rHist();
}

// TODAY
function rToday(){
  const rec=getRec(),act=getAct(),now=new Date();
  const dn=['일','월','화','수','목','금','토'];
  document.getElementById('td').textContent=`${now.getMonth()+1}월 ${now.getDate()}일 ${dn[now.getDay()]}요일`;
  document.getElementById('tg').textContent=now.getHours()<12?'오늘을 차분하게 시작해볼까요':'지금 흐름을 이어가볼까요';

  const wr=document.getElementById('wr');
  if(rec.wake){
    const t=new Date(rec.wake);
    wr.innerHTML=`<div class="wake-copy"><div class="wake-label">기상 시간</div><div class="wval">${f2(t.getHours())}:${f2(t.getMinutes())}</div></div><button class="btn bo bsm" onclick="recWake()">다시 기록</button>`;
  } else {
    wr.innerHTML=`<div class="wake-copy"><div class="wake-label">아직 기상 기록이 없어요</div><div style="font-size:18px;font-weight:700">오늘의 시작을 남겨보세요</div></div><button class="btn bo bsm" onclick="recWake()">⏰ 기상 기록</button>`;
  }

  const abc=document.getElementById('abc');
  if(act){
    const c=cat(act.category);
    abc.classList.add('on');
    abc.style.background=`linear-gradient(180deg, ${c.color}33 0%, ${c.color}18 100%)`;
    abc.style.border=`1px solid ${c.color}55`;
    document.getElementById('abi').textContent=c.i;
    document.getElementById('abi').style.background=c.color+'33';
    document.getElementById('abl').textContent=act.customLabel||c.l;
    document.getElementById('abs').textContent=`시작 ${ft(new Date(act.startTime))}`;
    updEl(act.startTime);
    clearInterval(etimer);
    etimer=setInterval(()=>updEl(act.startTime),1000);
  } else {
    abc.classList.remove('on');
    clearInterval(etimer);
  }

  const sl=rec.blocks.filter(b=>b.category==='sleep').reduce((s,b)=>s+dur(b),0);
  const ml=rec.blocks.filter(b=>b.category==='meal');
  document.getElementById('ss').textContent=sl>0?dTxt(sl):'-';
  document.getElementById('sm').textContent=`${ml.length}회`;
  document.getElementById('sa').textContent=`${rec.blocks.length}건`;
  rQGrid();

  const bl=document.getElementById('bl'),blt=document.getElementById('blt');
  const sorted=[...rec.blocks].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  blt.style.display=sorted.length>0?'block':'none';
  bl.innerHTML=sorted.map(b=>bRowHTML(b,dk())).join('');
}

function bRowHTML(b,d){
  const c=cat(b.category);
  const s=new Date(b.startTime);
  const e=b.endTime?new Date(b.endTime):null;
  const ts=`${f2(s.getHours())}:${f2(s.getMinutes())}${e?' - '+f2(e.getHours())+':'+f2(e.getMinutes()):''}`;
  const badge=!b.endTime?`<span class="rbadge" style="background:${c.color}22;color:${c.color}">진행 중</span>`:'';
  return `<div class="brow" onclick="openEdit('${b.id}','${d}')">
    <div class="bdot" style="background:${c.color}"></div>
    <div class="bi"><div class="bn">${c.i} ${b.customLabel||c.l}${badge}</div><div class="bt">${ts}${b.note?' · '+b.note:''}</div></div>
    <div class="bdur">${dTxt(dur(b))}</div>
  </div>`;
}

function rQGrid(){
  const qbs=getQB();
  document.getElementById('qg').innerHTML=qbs.map(q=>{
    const c=cat(q.c);
    const label=q.l||c.l;
    const sub=q.l?'직접 추가한 활동':'기본 활동';
    return`<div class="qbtn" onclick="startAct('${q.c}','${q.l||''}')"><div class="qi" style="background:${c.color}22">${c.i}</div><div style="flex:1;min-width:0"><div class="ql">${label}</div><div class="qsub">${sub}</div></div></div>`;
  }).join('')+`<div class="qbtn" onclick="openQE()"><div class="qi" style="background:#fff1">＋</div><div style="flex:1;min-width:0"><div class="ql">활동 추가</div><div class="qsub">편집에서 직접 이름 입력</div></div></div>`;
}

function updEl(st){
  const s=(Date.now()-new Date(st))/1000,h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
  document.getElementById('abe').textContent=h>0?`${h}:${f2(m)}:${f2(sec)}`:`${f2(m)}:${f2(sec)}`;
}
function recWake(){const r=getRec();r.wake=new Date().toISOString();saveRec(r);rToday();toast('기상 기록 완료')}
function startAct(c,lbl=''){
  const act=getAct();if(act)stopAct(false);
  const b={id:Date.now().toString(),category:c,customLabel:lbl,startTime:new Date().toISOString(),endTime:null,note:'',photos:[]};
  saveAct(b);const r=getRec();r.blocks.push(b);saveRec(r);rToday();cls('act-ov');toast(`${lbl||cat(c).l} 시작`);
}
function stopAct(n=true){
  const act=getAct();if(!act)return;act.endTime=new Date().toISOString();saveAct(null);
  const r=getRec();const i=r.blocks.findIndex(b=>b.id===act.id);if(i>-1)r.blocks[i]=act;saveRec(r);
  rToday();if(n)toast('활동 종료');
}

// EDIT BLOCK
function openEdit(bid,d){
  ebId=bid;ebDk=d;const r=getRec(d);const b=r.blocks.find(x=>x.id===bid);if(!b)return;
  eCat=b.category;rCatGrid('ecg',c=>{eCat=c},eCat);
  document.getElementById('ecl').value=b.customLabel||'';
  const s=new Date(b.startTime);document.getElementById('est').value=`${f2(s.getHours())}:${f2(s.getMinutes())}`;
  if(b.endTime){const e=new Date(b.endTime);document.getElementById('een').value=`${f2(e.getHours())}:${f2(e.getMinutes())}`;}
  else document.getElementById('een').value='';
  document.getElementById('enote').value=b.note||'';
  document.getElementById('edit-ov').classList.add('open');
}
function saveEdit(){
  const r=getRec(ebDk);const i=r.blocks.findIndex(b=>b.id===ebId);if(i<0)return;
  const b=r.blocks[i];b.category=eCat;b.customLabel=document.getElementById('ecl').value.trim();b.note=document.getElementById('enote').value.trim();

// ═══════════════ TIMELINE ═══════════════
function rTL(){rDStrip();rDayTimeline();rWeekCal()}
function rDStrip(){
  const strip=document.getElementById('ds');const days=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d);}
  const dn=['일','월','화','수','목','금','토'];
  strip.innerHTML=days.map(d=>{const k=dk(d);return`<div class="dchip ${k===tlDate?'on':''}" onclick="selTL('${k}')"><div class="dday">${dn[d.getDay()]}</div><div class="dnum">${d.getDate()}</div></div>`}).join('');
  setTimeout(()=>strip.scrollLeft=strip.scrollWidth,50);
}
function selTL(d){tlDate=d;rDStrip();rDayTimeline()}
function rDayTimeline(){
  const rec=getRec(tlDate);
  const sorted=[...rec.blocks].sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const axis=document.getElementById('dt-axis');
  const track=document.getElementById('rsvg');
  const dayPx=720;
  axis.innerHTML=Array.from({length:25},(_,i)=>{
    const hour=i===24?24:i;
    return `<div class="dt-hour" style="top:${(i/24)*100}%">${String(hour).padStart(2,'0')}:00</div>`;
  }).join('');
  const grids=Array.from({length:25},(_,i)=>`<div class="dt-grid ${i%6===0?'major':''}" style="top:${(i/24)*100}%"></div>`).join('');
  const blocks=sorted.map(b=>{
    const c=cat(b.category);const ds=new Date(b.startTime);ds.setHours(0,0,0,0);
    const s=(new Date(b.startTime)-ds)/86400000;
    const e=b.endTime?(new Date(b.endTime)-ds)/86400000:(Date.now()-ds.valueOf())/86400000;
    const top=Math.max(0,s*dayPx);const height=Math.max(28,(e-s)*dayPx);
    const st=new Date(b.startTime);const en=b.endTime?new Date(b.endTime):null;
    return `<div class="dt-block" style="top:${top}px;height:${height}px;background:${c.color}" onclick="openEdit('${b.id}','${tlDate}')"><div class="dt-time">${ft(st)}${en?' - '+ft(en):' - 진행 중'}</div><div class="dt-label">${c.i} ${b.customLabel||c.l}</div></div>`;
  }).join('');
  track.innerHTML=grids+(blocks||'<div class="dt-empty">0시부터 24시까지의 활동이 여기에 쌓여요.</div>');
  const cm={};rec.blocks.forEach(b=>{cm[b.category]=(cm[b.category]||0)+dur(b)});
  document.getElementById('tlleg').innerHTML=Object.entries(cm).sort((a,b)=>b[1]-a[1]).map(([k,s])=>{
    const c=cat(k);return`<div class="li" onclick="openCol('${k}')"><div class="ldot" style="background:${c.color}"></div><div class="ln">${c.i} ${c.l}</div><div class="ldur">${dTxt(s)}</div></div>`;
  }).join('')||`<div style="grid-column:1/-1;color:var(--tx2);font-size:14px;text-align:center;padding:8px 0">아직 기록된 활동이 없어요</div>`;
  document.getElementById('tlbl').innerHTML=(sorted.map(b=>bRowHTML(b,tlDate)).join(''))||`<div style="padding:20px;color:var(--tx2);font-size:14px;text-align:center">기록된 활동이 없어요</div>`;
}

function rWeekCal(){
  const H=300;const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d);}
  const dn=['일','월','화','수','목','금','토'];
  const timeLbls=Array.from({length:7},(_,i)=>{
    const h=i*4,top=(h/24)*H;
    return`<div class="wct" style="top:${top}px;transform:translateY(-50%)">${f2(h)}</div>`;
  }).join('');
  const cols=days.map(d=>{
    const rec=getRec(dk(d));const isT=dk(d)===dk();
    const blocks=rec.blocks.map(b=>{
      const c=cat(b.category);const ds=new Date(b.startTime);ds.setHours(0,0,0,0);
      const s=(new Date(b.startTime)-ds)/86400000,e=b.endTime?(new Date(b.endTime)-ds)/86400000:(Date.now()-ds.valueOf())/86400000;
      const hp=Math.max(2,(e-s)*H);
      return`<div class="wcblock" style="top:${s*H}px;height:${hp}px;background:${c.color};opacity:.85">
        ${hp>12?`<div class="wcbl">${c.i}</div>`:''}
      </div>`;
    }).join('');
    return`<div style="flex:1;display:flex;flex-direction:column;min-width:0">
      <div style="font-size:10px;text-align:center;margin-bottom:4px;font-weight:${isT?700:500};color:${isT?'var(--tx)':'var(--tx2)'}">${dn[d.getDay()]} ${d.getDate()}</div>
      <div style="height:${H}px;background:var(--sf2);border-radius:4px;position:relative;border:1px solid var(--bd)">${blocks}</div>
    </div>`;
  }).join('');
  document.getElementById('wc').innerHTML=`<div style="display:flex;gap:4px;min-width:280px">
    <div style="width:24px;padding-top:20px;flex-shrink:0;position:relative;height:${H+20}px">${timeLbls}</div>${cols}
  </div>`;
}

function getPerBlocks(){
  const all=ld('recs',{});let blocks=[];

  else if(sPeriod==='week'){for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const r=all[dk(d)];if(r)blocks.push(...r.blocks);}}
  else{for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const r=all[dk(d)];if(r)blocks.push(...r.blocks);}}

function rStats(){
  const blocks=getPerBlocks();const cm={};blocks.forEach(b=>{cm[b.category]=(cm[b.category]||0)+dur(b)});
  const ents=Object.entries(cm).sort((a,b)=>b[1]-a[1]);const tot=ents.reduce((s,[,v])=>s+v,0);

}

}

  Array.from(e.target.files).forEach(f=>{const rd=new FileReader();rd.onload=ev=>{dPhotos.push(ev.target.result);rDiaryPrev()};rd.readAsDataURL(f)});
}

// ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??PHOTO EDITOR ?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧?먥븧??let edBId=null,edBDk=null,edPIdxG=null;
function openEdFromDiary(i){edPIdxG=i;openEdSrc(dPhotos[i],'diary')}
function openEdFromBlock(bid,d,pi,e){e.stopPropagation();edBId=bid;edBDk=d;edPIdxG=pi;const rec=getRec(d);const b=rec.blocks.find(x=>x.id===bid);if(!b||!b.photos||!b.photos[pi])return;openEdSrc(b.photos[pi],'block')}
let edMode='diary';
function openEdSrc(src,mode){
  edMode=mode;edLayers=[];edTool='text';edCol='#ffffff';
  document.getElementById('edov').classList.add('open');
  const cv=document.getElementById('ec');edCtx=cv.getContext('2d');
  const img=new Image();img.onload=()=>{cv.width=img.width;cv.height=img.height;edBase=img;redraw()};img.src=src;
  const cols=['#ffffff','#000000','#FF6B6B','#FFB84D','#48DBFB','#1DD1A1','#54A0FF'];
  ['tcr','dcr'].forEach(id=>{
    document.getElementById(id).innerHTML=cols.map((c,i)=>
      `<div class="cdot ${i===0?'on':''}" style="background:${c}" onclick="setEdCol('${c}',this,'${id}')"></div>`
    ).join('');
  });
  document.getElementById('str').innerHTML=STKS.map(s=>`<div class="stbtn" onclick="addStk('${s}')">${s}</div>`).join('');
  setTool('text',document.querySelector('.etbtn'));
}
let edCtx=null;
function setTool(t,el){
  edTool=t;document.querySelectorAll('.etbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  document.getElementById('tp-text').style.display=t==='text'?'block':'none';
  document.getElementById('tp-sticker').style.display=t==='sticker'?'block':'none';
  document.getElementById('tp-draw').style.display=t==='draw'?'block':'none';
  const cv=document.getElementById('ec');
  if(t==='draw'){cv.onpointerdown=sD;cv.onpointermove=cD;cv.onpointerup=eD;}
  else{cv.onpointerdown=null;cv.onpointermove=null;cv.onpointerup=null;}
}
function setEdCol(c,el,rid){edCol=c;document.querySelectorAll(`#${rid} .cdot`).forEach(d=>d.classList.remove('on'));el.classList.add('on')}
function addTxt(){const t=document.getElementById('tin').value.trim();if(!t)return;edLayers.push({type:'text',text:t,x:.5,y:.4+Math.random()*.2,color:edCol,size:.06});document.getElementById('tin').value='';redraw()}
function addStk(s){edLayers.push({type:'sticker',text:s,x:.3+Math.random()*.4,y:.3+Math.random()*.4,size:.1});redraw()}
let edDP=[];
function sD(e){const r=e.target.getBoundingClientRect();const rx=(e.clientX-r.left)/r.width,ry=(e.clientY-r.top)/r.height;edDP=[{x:rx,y:ry}];edLayers.push({type:'path',points:edDP,color:edCol,width:.008});edDrawing=true}
function cD(e){if(!edDrawing)return;const r=e.target.getBoundingClientRect();edDP.push({x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height});redraw()}
function eD(){edDrawing=false;edDP=[]}
function redraw(){
  const cv=document.getElementById('ec');const ctx=edCtx;const w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);if(edBase)ctx.drawImage(edBase,0,0,w,h);
  edLayers.forEach(l=>{
    if(l.type==='text'||l.type==='sticker'){
      ctx.font=`bold ${l.size*h}px DM Sans,sans-serif`;ctx.fillStyle=l.color||'#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      if(l.type==='text'){ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=6;}
      ctx.fillText(l.text,l.x*w,l.y*h);ctx.shadowBlur=0;
    } else if(l.type==='path'&&l.points.length>1){
      ctx.strokeStyle=l.color;ctx.lineWidth=l.width*w;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();
      ctx.moveTo(l.points[0].x*w,l.points[0].y*h);l.points.slice(1).forEach(p=>ctx.lineTo(p.x*w,p.y*h));ctx.stroke();
    }
  });
}
function undoEd(){if(edLayers.length>0){edLayers.pop();redraw()}}
function saveEd(){
  const cv=document.getElementById('ec');const res=cv.toDataURL('image/jpeg',.85);
  if(edMode==='diary'){dPhotos[edPIdxG]=res;rDiaryPrev();}
  else if(edMode==='block'){const rec=getRec(edBDk);const b=rec.blocks.find(x=>x.id===edBId);if(b){if(!b.photos)b.photos=[];b.photos[edPIdxG]=res;saveRec(rec);}rHist();}
  closeEd();toast('?ъ쭊 ?????);
}
function closeEd(){
  document.getElementById('edov').classList.remove('open');
  const cv=document.getElementById('ec');cv.onpointerdown=null;cv.onpointermove=null;cv.onpointerup=null;
}
